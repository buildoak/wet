version: 2

project_name: wet

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - main: .
    binary: wet
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.ShortCommit}} -X main.date={{.Date}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

brews:
  - repository:
      owner: buildoak
      name: homebrew-tap
    name: wet
    homepage: "https://github.com/buildoak/wet"
    description: "Context compression proxy for Claude Code"
    license: "MIT"
    install: |
      bin.install "wet"

release:
  github:
    owner: buildoak
    name: wet
